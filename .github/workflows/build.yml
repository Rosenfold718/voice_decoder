name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Download ffmpeg (Windows essentials build)
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "ffmpeg.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive -Path $zipPath -DestinationPath "ffmpeg-temp" -Force
          $ffmpegRoot = Get-ChildItem "ffmpeg-temp" -Directory | Select-Object -First 1
          Write-Host "Found ffmpeg folder: $($ffmpegRoot.FullName)"
          New-Item -ItemType Directory -Force -Path "resources/ffmpeg"
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffmpeg.exe" "resources\ffmpeg\" -Force
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffprobe.exe" "resources\ffmpeg\" -Force
          & "resources\ffmpeg\ffmpeg.exe" -version
          Write-Host "ffmpeg bundled successfully"

      - name: Build Next.js + copy public to standalone
        run: npm run build

      - name: Verify standalone structure
        shell: pwsh
        run: |
          Write-Host "=== Standalone contents ==="
          Get-ChildItem ".next\standalone" | ForEach-Object { Write-Host $_.Name }
          Write-Host ""
          Write-Host "=== node_modules check ==="
          Test-Path ".next\standalone\node_modules"
          Write-Host ""
          Write-Host "=== server.js check ==="
          Test-Path ".next\standalone\server.js"
          Write-Host ""
          Write-Host "=== public check ==="
          Test-Path ".next\standalone\public"

      - name: Build Electron .exe
        run: npx electron-builder --win --publish never

      - name: Find the installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "dist-electron\*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Installer: $($exe.FullName)"
            Write-Host "Size: $([math]::Round($exe.Length / 1MB, 1)) MB"
            echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
            echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV
          } else {
            Write-Error "No .exe found in dist-electron!"
            exit 1
          }

      - name: Delete old release assets (re-tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release delete $tag --yes 2>$null; gh release create $tag --title "$tag" --generate-notes

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.EXE_PATH }}

      - name: Upload installer as artifact (for manual builds)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: vox-installer
          path: ${{ env.EXE_PATH }}
          retention-days: 30