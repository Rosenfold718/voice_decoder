name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Download whisper.cpp
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/ggerganov/whisper.cpp/releases/latest"
          $asset = $releases.assets | Where-Object { $_.name -like "*bin*x64*" -and $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "No suitable whisper.cpp release asset found"
            exit 1
          }
          Write-Host "Downloading whisper: $($asset.name) ($([math]::Round($asset.size/1MB, 1)) MB)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "whisper.zip" -UseBasicParsing
          Expand-Archive -Path "whisper.zip" -DestinationPath "whisper-temp" -Force
          New-Item -ItemType Directory -Force -Path "resources/whisper"
          # Find the main CLI executable (prefer non-deprecated name)
          $preferred = @("whisper-whisper-cli.exe", "whisper-cli.exe", "whisper.exe", "main.exe")
          $exes = Get-ChildItem "whisper-temp" -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "*upx*" }
          $exe = $null
          foreach ($name in $preferred) {
            $exe = $exes | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if ($exe) { break }
          }
          # Fallback: any exe if preferred names not found
          if (-not $exe) { $exe = $exes | Select-Object -First 1 }
          if ($exe) {
            Copy-Item $exe.FullName "resources\whisper\vox-whisper.exe" -Force
            Write-Host "Whisper binary: $($exe.Name) -> vox-whisper.exe"
          } else {
            Write-Error "No whisper executable found in archive"
            exit 1
          }

      - name: Download whisper model (medium, ~1.5GB — best Russian accuracy)
        shell: pwsh
        run: |
          $modelUrl = "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin"
          Write-Host "Downloading ggml-medium.bin model (this may take a few minutes)..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $modelUrl -OutFile "resources\whisper\ggml-medium.bin" -UseBasicParsing
          $size = (Get-Item "resources\whisper\ggml-medium.bin").Length
          if ($size -lt 100MB) {
            Write-Error "Model file too small ($([math]::Round($size/1MB, 1)) MB) — download may have failed"
            exit 1
          }
          Write-Host "Model size: $([math]::Round($size/1MB, 0)) MB"

      - name: Download ffmpeg (Windows essentials build)
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip" -UseBasicParsing
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp" -Force
          $ffmpegRoot = Get-ChildItem "ffmpeg-temp" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "resources/ffmpeg"
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffmpeg.exe" "resources\ffmpeg\" -Force
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffprobe.exe" "resources\ffmpeg\" -Force
          & "resources\ffmpeg\ffmpeg.exe" -version | Select-Object -First 1
          Write-Host "ffmpeg bundled"

      - name: Build Next.js static export
        run: npm run build

      - name: Verify output structure
        shell: pwsh
        run: |
          Write-Host "=== out/ contents ==="
          if (Test-Path "out\index.html") { Write-Host "  index.html OK" } else { Write-Error "  index.html MISSING"; exit 1 }
          Write-Host "=== whisper ==="
          Get-ChildItem "resources\whisper" | ForEach-Object { Write-Host "  $($_.Name) — $([math]::Round($_.Length/1MB, 1)) MB" }
          Write-Host "=== ffmpeg ==="
          Get-ChildItem "resources\ffmpeg" | ForEach-Object { Write-Host "  $($_.Name) — $([math]::Round($_.Length/1MB, 1)) MB" }

      - name: Build Electron .exe
        run: npx electron-builder --win --publish never

      - name: Find installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "dist-electron\*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Installer: $($exe.Name) ($([math]::Round($exe.Length/1MB, 0)) MB)"
            echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
          } else {
            Write-Error "No .exe installer found in dist-electron/"
            exit 1
          }

      - name: Delete old release (re-tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release delete $tag --yes 2>$null; gh release create $tag --title "$tag" --generate-notes

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.EXE_PATH }}

      - name: Upload as artifact (manual builds)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: vox-installer
          path: ${{ env.EXE_PATH }}
          retention-days: 30